{% extends "appbuilder/base.html" %}  {# ✅ Template correcto #}

{% block content %}
<div class="container">
    <h2>Lista de Ingredientes</h2>
    
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Unidad</th>
            </tr>
        </thead>
        <tbody>
            {% for ing in ingredientes %}
            <tr>
                <td>{{ ing.id }}</td>
                <td>{{ ing.nombre }}</td>
                <td>{{ ing.unidad or 'N/A' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
